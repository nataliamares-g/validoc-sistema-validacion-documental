name: validoc

services:
  database:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: validoc
      MYSQL_USER: validoc_user
      MYSQL_PASSWORD: validoc_pass
      MYSQL_ROOT_PASSWORD: root_pass_2026
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_pass_2026"]
      interval: 10s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/validoc?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City
      SPRING_DATASOURCE_USERNAME: validoc_user
      SPRING_DATASOURCE_PASSWORD: validoc_pass
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - app
    command: tunnel --no-autoupdate --url http://app:8080

volumes:
  mysql_data:
  uploads_data:
