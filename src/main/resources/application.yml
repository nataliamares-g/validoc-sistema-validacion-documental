spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/validoc?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Mexico_City}
    username: ${SPRING_DATASOURCE_USERNAME:validoc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:validoc_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  thymeleaf:
    cache: false
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  storage-dir: ${APP_STORAGE_DIR:uploads}
